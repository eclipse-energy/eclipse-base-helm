{{- if eq .Values.kafka.enabled true }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-kafka
  {{- include "eddie.kafka.labels" . | indent 2 }}
spec:
  selector:
    app: {{ .Release.Name }}-kafka
  type: ClusterIP
  ports:
    - name: internal
      port: 9092
      targetPort: 9092
    - name: controller
      port: 9093
      targetPort: 9093
    - name: cluster
      port: 9094
      targetPort: 9094
    - name: external
      port: 9095
      targetPort: 9095
{{- end }}
