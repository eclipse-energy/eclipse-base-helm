{{- if eq .Values.core.enabled true }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-core
  {{- include "eddie.core.labels" . | indent 2 }}
spec:
  selector:
    app: {{ .Release.Name }}-core
  ports:
    - name: api
      port: 8080
      targetPort: api
    - name: management
      port: 9090
      targetPort: management
{{- end }}
