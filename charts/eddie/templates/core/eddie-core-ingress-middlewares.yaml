{{- if eq .Values.ingress.type "traefik" }}
{{- if eq .Values.ingress.framework.enabled true }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Release.Name }}-core-strip-prefix-mw
  namespace: {{ .Release.Namespace }}
spec:
  stripPrefix:
    forceSlash: false
    prefixes:
      - "{{ .Values.ingress.framework.path }}"
{{- end }}
---
{{- if eq .Values.ingress.management.enabled true }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Release.Name }}-core-management-strip-prefix-mw
  namespace: {{ .Release.Namespace }}
spec:
  stripPrefix:
    forceSlash: false
    prefixes:
      - "{{ .Values.ingress.management.path }}"
---
{{- if eq .Values.ingress.management.basicAuth.enabled true }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Release.Name }}-core-management-basic-auth-mw
  namespace: {{ .Release.Namespace }}
spec:
  basicAuth:
    secret: {{ .Values.ingress.management.basicAuth.secretName }}
{{- end }}
{{- end }}
{{- end }}
