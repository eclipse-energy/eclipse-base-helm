{{- if eq .Values.ingress.enabled true }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}-ingress
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
  {{- if eq .Values.ingress.tls.enabled true }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.clusterIssuer }}
  {{- end }}
    traefik.ingress.kubernetes.io/router.middlewares: {{ .Release.Namespace }}-{{ .Release.Name }}-core-strip-prefix-mw@kubernetescrd

spec:
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: {{ .Values.ingress.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-core
                port:
                  number: 8080
{{- if eq .Values.ingress.tls.enabled true }}
  tls:
  - hosts:
    - {{ .Values.ingress.host }}
    secretName: {{ .Values.ingress.tls.secretName }}
{{- end }}
---
{{- if eq .Values.ingress.management.enabled true }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress-management
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}-ingress
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
  {{- if eq .Values.ingress.tls.enabled true }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.clusterIssuer }}
  {{- end }}
    traefik.ingress.kubernetes.io/router.middlewares: >
      {{ .Release.Namespace }}-{{ .Release.Name }}-core-management-strip-prefix-mw@kubernetescrd
      {{- if .Values.ingress.management.basicAuth.enabled }}
      ,{{ .Release.Namespace }}-{{ .Release.Name }}-core-management-basic-auth-mw@kubernetescrd
      {{- end }}

spec:
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: "{{ .Values.ingress.management.path }}"
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-core
                port:
                  number: 9090
{{- if eq .Values.ingress.tls.enabled true }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
{{- end }}
{{- end }}
{{- end }}