apiVersion: v2
name: eclipse-shared
description: Helm Chart of Shared components for ECLIPSE

type: application
version: 0.0.16
appVersion: "1.0.1"
dependencies:
  - name: grafana
    repository: https://grafana-community.github.io/helm-charts
    version: 11.0.1
    condition: grafana.enabled
  - name: loki
    repository: https://grafana.github.io/helm-charts
    version: 6.52.0
    condition: loki.enabled
  - name: promtail
    version: 6.17.0
    repository: https://grafana.github.io/helm-charts
    condition: promtail.enabled
