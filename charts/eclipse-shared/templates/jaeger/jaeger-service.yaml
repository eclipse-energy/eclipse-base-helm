{{- if eq .Values.jaeger.enabled true }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name}}-jaeger
  {{- include "eclipse-shared.jaeger.labels" . | indent 2 }}
spec:
  selector:
    app: {{ .Release.Name }}-jaeger
  ports:
    - name: otlp-receiver
      port: 4317
      targetPort: otlp-receiver
    - name: ui
      port: 16686
      targetPort: ui
{{- end }}
