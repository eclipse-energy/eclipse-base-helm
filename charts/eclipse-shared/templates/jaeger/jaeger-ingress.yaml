{{- if eq .Values.jaeger.enabled true }}
{{- if eq .Values.jaeger.ingress.enabled true }}
{{- if eq .Values.jaeger.ingress.basicAuth.enabled true }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Release.Name }}-jaeger-basic-auth-mw
  namespace: {{ .Release.Namespace }}
spec:
  basicAuth:
    secret: {{ .Values.jaeger.ingress.basicAuth.secret.name }}
{{- end }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jaeger-ingress
  annotations:
    {{- if eq .Values.ingress.tls.enabled true }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.clusterIssuer }}
    {{- end }}
    {{- if eq .Values.jaeger.ingress.basicAuth.enabled true }}
    traefik.ingress.kubernetes.io/router.middlewares: {{ .Release.Namespace }}-{{ .Release.Name }}-jaeger-basic-auth-mw@kubernetescrd
    {{- end }}
spec:
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: {{ .Values.jaeger.ingress.path }}
            pathType: Prefix
            backend:
              service:
                name: jaeger
                port:
                  name: ui

  {{- if eq .Values.ingress.tls.enabled true }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
{{- end }}
{{- end }}