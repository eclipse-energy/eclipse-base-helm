{{- if eq .Values.keycloak.enabled true }}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ .Release.Name }}-keycloak-postgres
  {{- include "eclipse-shared.keycloak.labels" . | indent 2 }}
spec:
  instances: {{ .Values.keycloak.postgres.replicaCount }}
  imageName: {{ .Values.keycloak.postgres.image.name }}:{{ .Values.keycloak.postgres.image.version }}

  bootstrap:
  {{- if .Values.keycloak.postgres.restore.enabled }}
    recovery:
      source: {{ .Release.Name }}-keycloak-postgres-azure
  {{- else }}
    initdb:
      database: keycloak
      owner: {{ .Values.keycloak.postgres.username }}
      secret:
        name: {{ .Values.keycloak.postgres.secret.name }}
  {{- end }}

  {{- if .Values.keycloak.postgres.restore.enabled }}
  externalClusters:
    - name: {{ .Release.Name }}-keycloak-postgres-azure
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: {{ .Release.Name }}-keycloak-postgres-azure
  {{- end }}

  storage:
    size: {{ .Values.keycloak.postgres.storageSize }}

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: {{ .Release.Name }}-keycloak-postgres-azure
{{- end }}
