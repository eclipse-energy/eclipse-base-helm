keycloak:
  enabled: true
  image:
    name: quay.io/keycloak/keycloak
    version: 26.2

  postgres:
    image:
      name: ghcr.io/cloudnative-pg/postgresql
      version: 17.6
    replicaCount: 1
    storageSize: 5Gi
    username: keycloak_user
    secret:
      name: keycloak-secret
      usernameKey: username
      passwordKey: password
    customEnvs:

  ingress:
    enabled: true
    path: /iam

  customEnvs:

jaeger:
  enabled: true
  image:
    name: jaegertracing/all-in-one
    version: 1.69.0

  ingress:
    basicAuth:
      enabled: false
      secret:
        name: jaeger-auth
    enabled: false
    path: /jaeger

ingress:
  host:
  tls:
    enabled: false
    clusterIssuer:
    secretName:
