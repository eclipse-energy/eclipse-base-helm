cluster:
  name: dev

imagePullSecret:
  name: ghcr-secret

core:
  image:
    name: ghcr.io/eclipse-energy/federator
    version: latest
  replicaCount: 1
  keysSecret:
    name: federator-keys-secret
  keycloak:
    uri:
    realm:

ingress:
  enabled: false
  host:
  path: /federator
  tls:
    enabled: false
    clusterIssuer:
    secretName:

postgres:
  enabled: true

  image:
    name: ghcr.io/cloudnative-pg/postgresql
    version: 17.6

  secret:
    name: postgres-secret
    usernameKey: username
    passwordKey: password

  instances: 1
  bootstrapMode: initdb # initdb for creation, recoverObjectStore for recovery
  database: federator
  owner: federator_user
  storageSize: 10Gi

  objectStore:
    blobStorage: # fill in values from azure
      storageName:
      containerName:
      blobName:
    retentionPolicy: 7d
    compression: gzip
    azureSecret:
      name: azure-secret
      connectionStringKey: connectionString

  recoveryObjectStore: # only required with bootstrapMode recoverObjectStore
    blobStorage: # fill in values from azure
      storageName:
      containerName:
      blobName:
    retentionPolicy: 7d
    compression: gzip
    azureSecret:
      name: azure-secret
      connectionStringKey: connectionString

  backup:
    enabled: true
    schedule: "0 0 0 * * *"

  customEnvs:
