apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: {{ .Release.Name }}-postgres
spec:
  cluster:
    name: {{ .Release.Name }}-postgres
  schedule: {{ .Values.postgres.backup.schedule }}
  backupOwnerReference: self
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io